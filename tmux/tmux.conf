unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g status-interval 0  
set -sg escape-time 0
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set-option -g history-limit 3000
set-option -g base-index 1
set-option -g set-titles on
set-option -g set-titles-string "#W"
set-option -g mouse on


bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R


# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator' 
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @vim_navigator_mapping_left "C-F1 C-h"  # use C-h and C-Left
set -g @vim_navigator_mapping_right "C-F2 C-l"
set -g @vim_navigator_mapping_up "C-PgUp C-k"
set -g @vim_navigator_mapping_down "C-PgDown C-j"
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_status_background "#1E2f26"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W"

run '~/.config/tmux/plugins/tpm/tpm'
